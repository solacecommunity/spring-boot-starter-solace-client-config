name: Publish package to the Maven Central Repository
on:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: 17
          server-id: ossrh
          distribution: adopt
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - id: validate-release-version
        name: Validate release version matches pom.xml
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"
          POM_VERSION="$(mvn -q --batch-mode -DforceStdout help:evaluate -Dexpression=project.version | sed -n '/^[0-9A-Za-z][0-9A-Za-z.\-]*$/p' | tail -n 1)"

          if [ -z "$POM_VERSION" ]; then
            echo "::error::Could not resolve project.version from pom.xml"
            exit 1
          fi

          if [ "$RELEASE_VERSION" != "$POM_VERSION" ]; then
            echo "::error::Release tag version '$RELEASE_VERSION' does not match pom.xml project.version '$POM_VERSION'"
            exit 1
          fi
      - id: install-secret-key
        name: Install gpg secret key
        run: |
          cat <(echo -e "${{ secrets.OSSRH_GPG_SECRET_KEY }}") | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
      - id: publish-to-central
        name: Publish to Central Repository
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          mvn \
            --no-transfer-progress \
            --batch-mode \
            -Dgpg.passphrase=${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }} \
            clean deploy
      - id: ensure-package-visible-in-publisher-portal
        name: Make POST Request with Curl
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.OSSRH_BEARER_TOKEN }}" \
          https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/community.solace?publishing_type=automatic
